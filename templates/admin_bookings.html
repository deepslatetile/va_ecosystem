{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="/static/styles/admin_bookings.css">
{% endblock %}

{% block content %}
<div class="admin-panel">
    <div class="admin-header">
        <h1>Бронирования</h1>
        <div class="admin-breadcrumb">
            <a href="/">Главная</a> / <a href="/admin">Панель администратора</a> /
            Бронирования
        </div>
    </div>

    <div class="filters-section">
        <h2>Фильтры</h2>
        <div class="filter-controls">
            <div class="filter-group">
                <label for="flightFilter">Номер рейса:</label>
                <input type="text" id="flightFilter" placeholder="Фильтр по номеру рейса...">
            </div>
            <button onclick="applyFilters()" class="apply-btn">
                <i class="fas fa-filter"></i> Применить фильтры
            </button>
            <button onclick="clearFilters()" class="clear-btn">
                <i class="fas fa-times"></i> Сбросить
            </button>
        </div>
    </div>

    <div class="bookings-list">
        <h2>Бронирования</h2>
        <div class="bookings-container" id="bookingsContainer">

        </div>
    </div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Детали бронирования</h2>
            <span class="close">&times;</span>
        </div>
        <div class="modal-body" id="modalBody">

        </div>
    </div>
</div>

<script src="/static/js/admin_bookings.js"></script>
{% endblock %}
