{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="/static/styles/admin_create_flight.css">
{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1>Создать новый рейс</h1>
        <div class="admin-breadcrumb">
            <a href="/">Главная</a> / <a href="/admin">Панель администратора</a> / Создать рейс
        </div>
    </div>

    <div id="adminAlerts"></div>

    <div class="admin-content">
        <div class="admin-card">
            <h2>Детали рейса</h2>
            <form id="createFlightForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="flightNumber">Номер рейса *</label>
                        <input type="text" id="flightNumber" name="flight_number" required
                               placeholder="например, VK101">
                    </div>
                    <div class="form-group">
                        <label for="aircraft">Тип воздушного судна *</label>
                        <input type="text" id="aircraft" name="aircraft" required
                               placeholder="например, B737-800">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="departure">Аэропорт вылета *</label>
                        <input type="text" id="departure" name="departure" required
                               placeholder="например, Москва DME">
                    </div>
                    <div class="form-group">
                        <label for="arrival">Аэропорт прилёта *</label>
                        <input type="text" id="arrival" name="arrival" required
                               placeholder="например, Красноярск KJA">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="ptfs_departure">Код вылета PTFS</label>
                        <input type="text" id="ptfs_departure" name="ptfs_departure"
                               placeholder="например, IZOL">
                    </div>
                    <div class="form-group">
                        <label for="ptfs_arrival">Код прилёта PTFS</label>
                        <input type="text" id="ptfs_arrival" name="ptfs_arrival"
                               placeholder="например, ENLK">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="route_type">Тип отображения маршрута *</label>
                        <select id="route_type" name="route_type" required>
                            <option value="ptfs">PTFS (показывать название аэропорта с кодом PTFS)</option>
                            <option value="real">Реальный (показывать только название аэропорта)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="datetime">Время вылета *</label>
                        <input type="datetime-local" id="datetime" name="datetime" required>
                    </div>
                    <div class="form-group">
                        <label for="arrival_time">Время прилёта *</label>
                        <input type="datetime-local" id="arrival_time" name="arrival_time" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="status">Статус рейса *</label>
                        <div class="combo-input-container">
                            <select id="status" name="status" required>
                                <option value="Scheduled">По расписанию</option>
                                <option value="On time">Вовремя</option>
                                <option value="Check-In">Регистрация</option>
                                <option value="Boarding">Посадка</option>
                                <option value="Enroute">В пути</option>
                                <option value="Arrived">Прибыл</option>
                                <option value="Delayed">Задержан</option>
                                <option value="Cancelled">Отменён</option>
                                <option value="custom">Свой вариант...</option>
                            </select>
                            <input type="text" id="status_custom" name="status_custom"
                                   placeholder="Введите свой статус" style="display: none;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="meal">Питание на борту</label>
                        <div class="combo-input-container">
                            <select id="meal" name="meal">
                                <option value="Standard Meal Service">Стандартное питание</option>
                                <option value="Drinks Only">Только напитки</option>
                                <option value="custom">Свой вариант...</option>
                            </select>
                            <input type="text" id="meal_custom" name="meal_custom"
                                   placeholder="Введите свой вариант" style="display: none;">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="seatmap">Конфигурация мест *</label>
                        <div class="combo-input-container">
                            <select id="seatmap" name="seatmap" required>
                                <option value="">Выберите или введите свой вариант...</option>
                            </select>
                            <input type="text" id="seatmap_custom" name="seatmap_custom"
                                   placeholder="Введите свою конфигурацию" style="display: none;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="boarding_pass_default">Стиль посадочного талона *</label>
                        <div class="combo-input-container">
                            <select id="boarding_pass_default" name="boarding_pass_default" required>
                                <option value="">Выберите или введите свой вариант...</option>
                            </select>
                            <input type="text" id="boarding_pass_custom" name="boarding_pass_custom"
                                   placeholder="Введите свой стиль" style="display: none;">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="services-header">
                        <label for="services">Доступные услуги</label>
                    </div>
                    <div id="servicesCheckboxes" class="checkboxes-container">
                        <div class="loading-text">Загрузка услуг...</div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="previewBtn" class="btn-secondary">
                        <i class="fas fa-eye"></i> Предпросмотр
                    </button>
                    <button type="submit" id="createBtn" class="btn-primary">
                        <i class="fas fa-plus"></i> Создать рейс
                    </button>
                </div>
            </form>
        </div>

        <div class="admin-card" id="previewSection" style="display: none;">
            <h2>Предпросмотр рейса</h2>
            <div id="flightPreview"></div>
        </div>
    </div>
</div>

<div id="createServiceModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Создать новую услугу</h3>
            <span class="close">&times;</span>
        </div>
        <div class="modal-body">
            <form id="createServiceForm">
                <div class="form-group">
                    <label for="serviceName">Название услуги *</label>
                    <input type="text" id="serviceName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="serviceDescription">Описание</label>
                    <textarea id="serviceDescription" name="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="servicePrice">Цена ($) *</label>
                    <input type="number" id="servicePrice" name="price" step="0.01" min="0" value="0" required>
                </div>
                <div class="form-group">
                    <label for="serviceCategory">Категория *</label>
                    <select id="serviceCategory" name="category" required>
                        <option value="food">Еда и напитки</option>
                        <option value="entertainment">Развлечения</option>
                        <option value="comfort">Комфорт</option>
                        <option value="premium">Премиум услуги</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelServiceBtn">Отмена</button>
                    <button type="submit" class="btn-primary">Создать услугу</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/static/js/admin_create_flight.js"></script>
{% endblock %}
