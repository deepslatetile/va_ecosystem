{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="/static/styles/fleet_team.css">
{% endblock %}

{% block content %}
<div class="team-page">
    <div class="page-header">
        <h1><i class="fas fa-users"></i> Наша команда</h1>
        <p class="subtitle">Познакомьтесь с профессионалами, стоящими за Авиакомпанией «Вектор»</p>
    </div>

    <div class="page-content">
        <div class="filters-container">
            <div class="filter-group">
                <label for="departmentFilter">Фильтр по отделу:</label>
                <select id="departmentFilter" class="filter-select">
                    <option value="all">Все отделы</option>
                    <option value="pilots">Лётный состав</option>
                    <option value="cabin">Бортпроводники</option>
                    <option value="operations">Операции</option>
                    <option value="maintenance">Техобслуживание</option>
                    <option value="management">Руководство</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sortFilter">Сортировка:</label>
                <select id="sortFilter" class="filter-select">
                    <option value="name">По имени</option>
                    <option value="experience">По опыту</option>
                    <option value="position">По должности</option>
                </select>
            </div>
            <button id="resetFilters" class="btn-secondary">
                <i class="fas fa-redo"></i> Сбросить фильтры
            </button>
        </div>

        <div id="teamContainer" class="team-grid">
            <div class="loading-container">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Загрузка информации о команде...</p>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/team.js"></script>
{% endblock %}
