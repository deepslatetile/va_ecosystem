{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/styles/fleet_team.css">
{% endblock %}

{% block content %}
<div class="fleet-page">
    <div class="page-header">
        <h1><i class="fas fa-plane"></i> Наш флот</h1>
        <p class="subtitle">Познакомьтесь с нашим современным и комфортабельным парком воздушных судов</p>
    </div>

    <div class="page-content">

        <div class="filters-container">
            <div class="filter-group">
                <label for="typeFilter">Фильтр по типу:</label>
                <select id="typeFilter" class="filter-select">
                    <option value="all">Все типы</option>
                    <option value="narrow-body">Узкофюзеляжные</option>
                    <option value="wide-body">Широкофюзеляжные</option>
                    <option value="regional">Региональные</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="statusFilter">Статус:</label>
                <select id="statusFilter" class="filter-select">
                    <option value="all">Все статусы</option>
                    <option value="active">В эксплуатации</option>
                    <option value="maintenance">На обслуживании</option>
                    <option value="future">Будущие поставки</option>
                </select>
            </div>
            <button id="resetFilters" class="btn-secondary">
                <i class="fas fa-redo"></i> Сбросить фильтры
            </button>
        </div>

        <div id="fleetContainer" class="fleet-grid">
            <div class="loading-container">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Загрузка информации о флоте...</p>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/fleet.js"></script>
{% endblock %}
