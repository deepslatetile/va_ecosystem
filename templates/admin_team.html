{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/styles/admin_fleet_team.css">
{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-users"></i> Управление командой</h1>
        <div class="admin-breadcrumb">
            <a href="/">Главная</a> / <a href="/admin">Панель администратора</a> / Управление командой
        </div>
    </div>

    <div id="adminAlerts"></div>

    <div class="admin-content">
        <div class="admin-actions">
            <button id="addMemberBtn" class="btn-primary">
                <i class="fas fa-plus"></i> Добавить сотрудника
            </button>
            <button id="refreshBtn" class="btn-secondary">
                <i class="fas fa-sync-alt"></i> Обновить
            </button>
        </div>

        <div class="admin-card">
            <h2>Сотрудники</h2>
            <div class="table-container">
                <table id="teamTable">
                    <thead>
                    <tr>
                        <th>Имя</th>
                        <th>Должность</th>
                        <th>Отдел</th>
                        <th>Опыт</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="teamTableBody">
                    <tr>
                        <td colspan="6" class="loading-cell">
                            <i class="fas fa-spinner fa-spin"></i> Загрузка данных о команде...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="memberModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Добавить сотрудника</h3>
            <span class="close">&times;</span>
        </div>
        <div class="modal-body">
            <form id="memberForm">
                <input type="hidden" id="memberId">

                <div class="form-row">
                    <div class="form-group">
                        <label for="memberName">Полное имя *</label>
                        <input type="text" id="memberName" name="name" required
                               placeholder="например, Иван Петров">
                    </div>
                    <div class="form-group">
                        <label for="memberPosition">Должность *</label>
                        <input type="text" id="memberPosition" name="position" required
                               placeholder="например, Старший пилот">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="memberRole">Роль/Звание</label>
                        <input type="text" id="memberRole" name="role"
                               placeholder="например, Капитан, Бортпроводник">
                    </div>
                    <div class="form-group">
                        <label for="memberDepartment">Отдел *</label>
                        <select id="memberDepartment" name="subgroup" required>
                            <option value="">Выберите отдел</option>
                            <option value="pilots">Лётный состав</option>
                            <option value="cabin">Бортпроводники</option>
                            <option value="operations">Операции</option>
                            <option value="maintenance">Техобслуживание</option>
                            <option value="management">Руководство</option>
                            <option value="support">Вспомогательный персонал</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="memberExperience">Лет опыта</label>
                        <input type="number" id="memberExperience" name="years_experience"
                               placeholder="например, 10" min="0" max="50">
                    </div>
                    <div class="form-group">
                        <label for="memberOrder">Порядок отображения</label>
                        <input type="number" id="memberOrder" name="display_order"
                               placeholder="Порядок в списке" value="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="memberDescription">Биография/Описание</label>
                    <textarea id="memberDescription" name="description" rows="4"
                              placeholder="Профессиональный опыт, достижения и т.д."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="memberImage">URL изображения</label>
                        <input type="text" id="memberImage" name="image"
                               placeholder="URL фотографии">
                    </div>
                    <div class="form-group">
                        <label for="memberLink">Ссылка на профиль</label>
                        <input type="text" id="memberLink" name="link"
                               placeholder="URL соцсети или профиля">
                    </div>
                </div>

                <div class="form-group">
                    <label for="memberStatus">Статус</label>
                    <select id="memberStatus" name="is_active">
                        <option value="true">Активен</option>
                        <option value="false">Неактивен</option>
                    </select>
                </div>

                <input type="hidden" name="about_group" value="team">

                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelMemberBtn">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/static/js/admin_team.js"></script>
{% endblock %}
