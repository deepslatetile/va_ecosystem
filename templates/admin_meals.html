{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="/static/styles/admin_meals.css">
{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-utensils"></i> Управление меню</h1>
        <div class="admin-breadcrumb">
            <a href="/">Главная</a> / <a href="/admin">Панель администратора</a> / Меню
        </div>
    </div>

    <div id="adminAlerts"></div>

    <div class="admin-controls">
        <button class="btn-primary" onclick="showAddMealForm()">
            <i class="fas fa-plus"></i> Добавить блюдо
        </button>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск блюд...">
            <i class="fas fa-search"></i>
        </div>
    </div>

    <div id="mealForm" class="admin-card" style="display: none;">
        <h2 id="formTitle">Добавить блюдо</h2>
        <form id="mealFormElement">
            <input type="hidden" id="mealId">

            <div class="form-row">
                <div class="form-group">
                    <label for="serve_class">Класс обслуживания *</label>
                    <input type="text" id="serve_class" required
                           placeholder="Например, Эконом, Бизнес, Первый, Сезонное">
                </div>

                <div class="form-group">
                    <label for="serve_time">Время подачи *</label>
                    <input type="text" id="serve_time" required
                           placeholder="Например, завтрак, обед, ужин, перекус">
                </div>
            </div>

            <div class="form-group">
                <label for="name">Название блюда *</label>
                <input type="text" id="name" required placeholder="Введите название блюда">
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" rows="3" placeholder="Описание блюда"></textarea>
            </div>

            <div class="form-group">
                <label for="image">URL изображения</label>
                <input type="url" id="image" placeholder="https://example.com/image.jpg">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Сохранить
                </button>
                <button type="button" class="btn-secondary" onclick="hideMealForm()">
                    <i class="fas fa-times"></i> Отмена
                </button>
            </div>
        </form>
    </div>

    <div class="admin-card">
        <h2>Текущее меню</h2>
        <div class="filters">
            <select id="classFilter" onchange="filterMeals()">
                <option value="">Все классы</option>
            </select>
            <select id="timeFilter" onchange="filterMeals()">
                <option value="">Всё время</option>
            </select>
        </div>

        <div class="meals-grid" id="mealsGrid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Загрузка меню...</p>
            </div>
        </div>
    </div>
</div>

<div id="deleteModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Подтверждение удаления</h3>
            <span class="close" onclick="closeDeleteModal()">&times;</span>
        </div>
        <div class="modal-body">
            <p>Вы уверены, что хотите удалить блюдо "<span id="deleteMealName"></span>"?</p>
            <p class="text-warning">Это действие необратимо.</p>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeDeleteModal()">Отмена</button>
            <button class="btn-danger" onclick="confirmDelete()">
                <i class="fas fa-trash"></i> Удалить
            </button>
        </div>
    </div>
</div>

<script src="/static/js/admin_meals.js"></script>
{% endblock %}
