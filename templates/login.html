{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="/static/styles/login.css">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>

        <form id="loginForm" class="auth-form active">
            <h2>С возвращением</h2>
            <p class="auth-subtitle">Войдите в свой аккаунт Авиакомпании «Вектор»</p>

            <div class="form-group">
                <label for="loginUsername">Имя пользователя</label>
                <input type="text" id="loginUsername" name="username" required>
                <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
                <label for="loginPassword">Пароль</label>
                <input type="password" id="loginPassword" name="password" required>
                <i class="fas fa-lock"></i>
            </div>

            <div class="form-options">
                <!-- <label class="checkbox">
                    <input type="checkbox" name="remember">
                    <span class="checkmark"></span>
                    Запомнить меня
                </label> -->
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-sign-in-alt"></i>
                Войти
            </button>
        </form>

        <form id="registerForm" class="auth-form">
            <h2>Создать аккаунт</h2>
            <p class="auth-subtitle">Присоединяйтесь к Авиакомпании «Вектор» сегодня</p>

            <div class="form-group">
                <label for="regNickname">Никнейм</label>
                <input type="text" id="regNickname" name="nickname" required>
                <i class="fas fa-user-tag"></i>
            </div>

            <div class="form-group">
                <label for="regPassword">Пароль</label>
                <input type="password" id="regPassword" name="password" required>
                <i class="fas fa-lock"></i>
            </div>

            <div class="form-group">
                <label for="regConfirmPassword">Подтверждение пароля</label>
                <input type="password" id="regConfirmPassword" name="confirm_password" required>
                <i class="fas fa-lock"></i>
            </div>

            <div class="form-options">
                <label class="checkbox">
                    <input type="checkbox" name="terms" required>
                    <span class="checkmark"></span>
                    Я принимаю <a href="/tos" target="_blank">Условия использования</a> и <a href="/privacy-policy" target="_blank">Политику конфиденциальности</a>
                </label>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-user-plus"></i>
                Зарегистрироваться
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/login.js"></script>
{% endblock %}
