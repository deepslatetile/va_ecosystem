{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="/static/styles/my-bookings.css">
{% endblock %}

{% block content %}
<div class="bookings-container">
    <div class="bookings-header">
        <h1>Мои бронирования</h1>
        <div class="bookings-controls">
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="active">Активные</button>
                <button class="filter-btn" data-filter="past">Прошедшие</button>
                <button class="filter-btn" data-filter="cancelled">Отменённые</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск бронирований...">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </div>

    <div class="bookings-alerts" id="bookingsAlerts">
        <!-- Alerts will appear here -->
    </div>

    <div class="bookings-list" id="bookingsList">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Загрузка ваших бронирований...</p>
        </div>
    </div>

    <!-- Modal for booking details and editing -->
    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Детали бронирования</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be loaded here -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Закрыть</button>
                <button class="btn-danger" id="cancelBookingBtn" style="display: none;">Отменить бронирование</button>
                <button class="btn-primary" id="saveBookingBtn" style="display: none;">Сохранить изменения</button>
                <button class="btn-primary" id="viewBoardingPassBtn" style="display: none;">Посмотреть посадочный талон</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/my-bookings.js"></script>
{% endblock %}
